# Example OpenTelemetry Collector config
receivers:
  otlp:
    protocols:
      grpc:
      http:
exporters:
  kafka:
    brokers:
      - localhost:9092
  jaeger:
    endpoint: 'localhost:14250'
    tls:
      insecure: true
service:
  pipelines:
    traces:
      receivers: [otlp]
      exporters: [kafka, jaeger]
    metrics:
      receivers: [otlp]
      exporters: [kafka]
    logs:
      receivers: [otlp]
      exporters: [kafka]
